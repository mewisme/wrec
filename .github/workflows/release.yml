name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $dir = "dist/wrec-$version-windows-x64"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item build/Release/wrec.exe $dir/
          Copy-Item README.md $dir/
          Copy-Item LICENSE $dir/
          Compress-Archive -Path $dir/* -DestinationPath "dist/wrec-$version-windows-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: dist/wrec-${{ steps.version.outputs.version }}-windows-x64.zip
          generate_release_notes: true
