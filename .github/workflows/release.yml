name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release "-DWREC_VERSION:STRING=${{ steps.version.outputs.version }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Package release assets
        shell: pwsh
        run: |
          ./scripts/release-packaging.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -ExePath "build/wrec.exe" `
            -DistDir "dist"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: |
            dist/wrec-v${{ steps.version.outputs.version }}-windows-amd64.zip
            dist/SHA256SUMS
            dist/wrec.json
          generate_release_notes: true

      - name: Update Scoop manifest on main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.version.outputs.version }}"
          cp bucket/wrec.json /tmp/wrec-bucket.json
          git fetch origin main
          git checkout main
          cp /tmp/wrec-bucket.json bucket/wrec.json
          git add bucket/wrec.json
          git diff --staged --quiet || git commit -m "chore(release): update scoop manifest for v${VERSION}"
          git push origin main
